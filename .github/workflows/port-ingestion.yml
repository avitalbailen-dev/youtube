name: Ingest YouTube Catalog
on:
  workflow_dispatch:

jobs:
  sync-youtube-to-port:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Transform Data
        id: transform
        run: |
          # 1. Fetch from YouTube
          curl -G "https://www.googleapis.com/youtube/v3/playlistItems" \
            --data-urlencode "part=snippet,contentDetails" \
            --data-urlencode "maxResults=50" \
            --data-urlencode "playlistId=PL5ErBr2d3QJH0kbwTQ7HSuzvBb4zIWzhy" \
            --data-urlencode "key=${{ secrets.YOUTUBE_API_KEY }}" > raw_response.json

          # 2. Transform to Port Format and save to a variable
          # We use -c to keep the JSON on one single line
          ENTITIES=$(cat raw_response.json | jq -c --arg PID "PLfC-pOKASxcfHzNw8LHVYNlubvL75Dryr" '[.items[] | {
            "identifier": .contentDetails.videoId,
            "title": .snippet.title,
            "properties": {
              "link": ("https://www.youtube.com/watch?v=" + .contentDetails.videoId),
              "publishedAt": .snippet.publishedAt,
              "thumbnail": .snippet.thumbnails.high.url
            },
            "relations": {
              "playlist": $PID
            }
          }]')

          # 3. Export the variable so the next step can see it
          echo "port_entities=$ENTITIES" >> $GITHUB_OUTPUT

      - name: Upsert to Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: BULK_UPSERT
          blueprint: youtube_video
          entities: ${{ steps.transform.outputs.port_entities }}
